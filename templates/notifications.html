<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ 'bg-dark text-white' if theme == 'dark' else 'bg-light' }}">

{% include 'navbar.html' %}

<div class="container mt-5">

<h2 class="mb-4"><i class="bi bi-bell-fill"></i> Notifications</h2>

{% if notifications|length == 0 %}
<p>No notifications yet.</p>
{% endif %}

{% for n in notifications %}
<div class="notif-item">
    {{ n.message }}
    <br>
    <small class="text-muted">{{ n.created_at.strftime('%d %b %Y, %I:%M %p') }}</small>
</div>
{% endfor %}

<a href="/" class="btn btn-primary mt-3">Home</a>

</div>

</body>
</html>
