<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ 'bg-dark text-white' if theme == 'dark' else 'bg-light' }}">

{% include 'navbar.html' %}

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-4">
<div class="card shadow {{ 'bg-secondary text-white' if theme == 'dark' else '' }}">
<div class="card-body">

<h2 class="text-center">Login</h2>

<form method="POST">

<input class="form-control mb-3" type="text" name="username" placeholder="Username" required>
<input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

<button class="btn btn-primary w-100" type="submit">Login</button>

</form>

</div>
</div>
</div>
</div>
</div>

</body>
</html>
