<!DOCTYPE html>
<html>
<head>
    <title>Register - Nexora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ 'bg-dark text-white' if theme == 'dark' else 'bg-light' }}">

{% include 'navbar.html' %}

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card shadow {{ 'bg-secondary text-white' if theme == 'dark' else '' }}">
<div class="card-body">

<h2 class="text-center mb-4">Create Your Nexora Account</h2>

<form method="POST" enctype="multipart/form-data">

<input class="form-control mb-3" type="text" name="username" placeholder="Username" required>
<input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
<input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

<textarea class="form-control mb-3" name="bio" rows="3" placeholder="Tell us about yourself"></textarea>

<label class="mb-2">Profile Picture</label>
<input class="form-control mb-3" type="file" name="profile_pic">

<button class="btn btn-success w-100" type="submit">Register</button>

</form>

<hr>

<p class="text-center">
    Already have an account? <a href="/login">Login</a>
</p>

</div>
</div>
</div>
</div>
</div>

</body>
</html>
