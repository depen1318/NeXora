<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ 'bg-dark text-white' if theme == 'dark' else 'bg-light' }}">

{% include 'navbar.html' %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow {{ 'bg-secondary text-white' if theme == 'dark' else '' }}">
                <div class="card-body">

                    <h2 class="mb-4">Create New Post</h2>

                    <form method="POST" enctype="multipart/form-data">

                        <input class="form-control mb-3" type="text" name="title" placeholder="Post Title" required>

                        <textarea class="form-control mb-3" name="content" rows="6" placeholder="What's on your mind?" required></textarea>

                        <label class="mb-2">Add a Photo (optional)</label>
                        <input class="form-control mb-3" type="file" name="post_image">

                        <button class="btn btn-success" type="submit">Publish Post</button>
                        <a href="/" class="btn btn-secondary">Back</a>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
