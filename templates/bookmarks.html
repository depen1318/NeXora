<!DOCTYPE html>
<html>
<head>
    <title>Saved Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ 'bg-dark text-white' if theme == 'dark' else 'bg-light' }}">

{% include 'navbar.html' %}

<div class="container mt-5">

<h2 class="mb-4"><i class="bi bi-bookmark-fill"></i> Saved Posts</h2>

{% if posts|length == 0 %}
<p>You haven't saved any posts yet.</p>
{% endif %}

{% for post in posts %}
<div class="card mb-3 {{ 'bg-secondary text-white' if theme == 'dark' else '' }}">
<div class="card-body">

{% if post.image %}
<img src="{{ url_for('static', filename='uploads/' + post.image) }}" class="post-image mb-3">
{% endif %}

<h5>{{ post.title }}</h5>
<p>{{ post.content }}</p>
<small>by <a href="/user/{{ post.username }}">{{ post.username }}</a></small>

</div>
</div>
{% endfor %}

<a href="/" class="btn btn-primary mt-3">Home</a>

</div>

</body>
</html>
