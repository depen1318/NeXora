<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ 'bg-dark text-white' if theme == 'dark' else 'bg-light' }}">

{% include 'navbar.html' %}

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow {{ 'bg-secondary text-white' if theme == 'dark' else '' }}">
<div class="card-body">

<h2 class="mb-4">Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">

<label class="mb-2">Bio</label>
<textarea class="form-control mb-3" name="bio" rows="3">{{ user.bio }}</textarea>

<label class="mb-2">New Profile Picture</label>
<input class="form-control mb-3" type="file" name="profile_pic">

<button class="btn btn-success" type="submit">Save Changes</button>
<a href="/profile" class="btn btn-secondary">Cancel</a>

</form>

</div>
</div>
</div>
</div>
</div>

</body>
</html>
